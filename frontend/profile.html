<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile Setup</title>

    <script type="text/javascript" src="https://gc.kis.v2.scr.kaspersky-labs.com/FD126C42-EBFA-4E12-B309-BB3FDD723AC1/main.js?attr=MG5xlATTLrzF5XlttyXDvhO6DvTRLmGiGg-Qqa3qPsNwFg_6aGY-Y94lkFyBzeWUa3_YGEYB1QfACQwEBiZUtI5QhmAaefEsHd04wEVTVkwb0_lX6wgAOwynI8FXYX29x7bDzedY_ub0s8gMojst2l1hHQNKrroJghPVSaHYxZJFgKwQLb6LkVOJjHs6ZcyWOrazBAyLHV0SYcShrKvPk9WtAm1g0j-QVBOmSrrHd5_k5pVY1eXOlxjxYR8CmCNsvVftR1dXJuk7VRRO1R_Itw" charset="UTF-8"></script><style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f1f5ff;
            display:flex;
            justify-content:center;
            padding:20px;
        }

        .container{
            width:700px;
            background:white;
            border-radius:20px;
            overflow:hidden;
            box-shadow:0px 0px 15px rgba(0,0,0,0.2);
        }

        .header{
            background:linear-gradient(to right,#7c3aed,#2563eb);
            color:white;
            padding:25px;
        }

        .header h1{
            font-size:30px;
        }

        .header p{
            margin-top:10px;
        }

        .notice{
            background:#dbeafe;
            margin:20px;
            padding:15px;
            border-radius:10px;
            color:#1e3a8a;
        }

        .profile{
            text-align:center;
            margin:20px 0;
        }

        .profile p{
            margin-top:10px;
            color:gray;
        }

        .section-title{
            font-size:22px;
            color:#7c3aed;
            font-weight:bold;
            margin:20px;
        }

        .form{
            padding:20px;
        }

        .row{
            display:flex;
            gap:20px;
            margin-bottom:20px;
        }

        .input-box{
            flex:1;
        }

        label{
            display:block;
            margin-bottom:8px;
            font-weight:bold;
        }

        input, textarea, select{
            width:100%;
            padding:14px;
            border:1px solid #ccc;
            border-radius:10px;
            font-size:15px;
        }

        textarea{
            resize:none;
            height:100px;
        }

        button{
            width:100%;
            padding:16px;
            border:none;
            border-radius:12px;
            background:linear-gradient(to right,#7c3aed,#2563eb);
            color:white;
            font-size:18px;
            cursor:pointer;
            margin-top:20px;
            margin-bottom:20px;
        }

        button:hover{
            opacity:0.9;
        }

        @media(max-width:700px){

            .row{
                flex-direction:column;
            }

            .container{
                width:100%;
            }

        }

    </style>

</head>

<body>

<div class="container">

    <div class="header">

        <h1>Complete Your Profile - First Time Setup</h1>

        <p>Please fill your information to continue</p>

    </div>

    <div class="notice">

        Welcome to GENESIS! Please complete your student profile setup.

    </div>

    <!-- Profile Upload -->

    <div class="profile">

        <label for="profileInput">

            <img
                id="profilePreview"
                src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png"
                width="140"
                height="140"
                style="
                    border-radius:50%;
                    object-fit:cover;
                    cursor:pointer;
                    border:4px solid #7c3aed;
                "
            >

        </label>

        <input
            type="file"
            id="profileInput"
            accept="image/*"
            style="display:none"
        >

        <p>Click image to upload profile picture</p>

    </div>

    <div class="section-title">
        Personal Information
    </div>

    <div class="form">

        <div class="row">

            <div class="input-box">

                <label>Full Name</label>

                <input type="text" id="name" placeholder="Enter full name">

            </div>

            <div class="input-box">

                <label>USN</label>

                <input type="text" id="usn" placeholder="Enter USN" readonly>

            </div>

        </div>

        <div class="row">

            <div class="input-box">

                <label>Date of Birth</label>

                <input type="date" id="dob">

            </div>

            <div class="input-box">

                <label>Mobile Number</label>

                <input type="number" id="mobile" placeholder="Enter mobile number">

            </div>

        </div>

        <div class="row">

            <div class="input-box">

                <label>Email</label>

                <input type="email" id="email" placeholder="Enter email">

            </div>

            <div class="input-box">

                <label>LinkedIn Profile</label>

                <input type="url" id="linkedin" placeholder="https://linkedin.com">

            </div>

        </div>

        <div class="row">

            <div class="input-box">

                <label>Github Link</label>

                <input type="url" id="github" placeholder="https://github.com">

            </div>

            <div class="input-box">

                <label>Google SkillsBoost</label>

                <input type="url" id="skillsboost" placeholder="https://google.com">

            </div>

        </div>

        <div class="section-title">

            Parent / Guardian Details

        </div>

        <div class="row">

            <div class="input-box">

                <label>Father Mobile</label>

                <input type="number" id="fatherMobile" placeholder="Father mobile number">

            </div>

            <div class="input-box">

                <label>Mother Mobile</label>

                <input type="number" id="motherMobile" placeholder="Mother mobile number">

            </div>

        </div>

        <div class="section-title">

            Hobbies & Achievements

        </div>

        <div class="row">

            <div class="input-box">

                <label>Hobbies</label>

                <input type="text" id="hobbies" placeholder="Reading, Coding">

            </div>

            <div class="input-box">

                <label>Category</label>

                <select id="category">

                    <option>Select Category</option>
                    <option>Sports</option>
                    <option>Technology</option>
                    <option>Music</option>
                    <option>Gaming</option>

                </select>

            </div>

        </div>

        <div class="row">

            <div class="input-box">

                <label>Achievements</label>

                <textarea id="achievements" placeholder="Enter achievements"></textarea>

            </div>

        </div>

        <button onclick="saveProfile()">
            Save & Continue to Dashboard →
        </button>

    </div>

</div>

<script>

function saveProfile(){

    const name = document.getElementById("name").value;
    const usn = document.getElementById("usn").value.toUpperCase();

    if(name === "" || usn === ""){

        alert("Please fill your full name!");

    }
    else{
        // Save student info to localStorage
        localStorage.setItem("studentName", name);
        localStorage.setItem("studentUSN", usn);
        
        // Save additional profile data
        const dob = document.getElementById("dob").value;
        const mobile = document.getElementById("mobile").value;
        const email = document.getElementById("email").value;
        const linkedin = document.getElementById("linkedin").value;
        const github = document.getElementById("github").value;
        const skillsboost = document.getElementById("skillsboost").value;
        const fatherMobile = document.getElementById("fatherMobile").value;
        const motherMobile = document.getElementById("motherMobile").value;
        const hobbies = document.getElementById("hobbies").value;
        const category = document.getElementById("category").value;
        const achievements = document.getElementById("achievements").value;
        
        if(dob) localStorage.setItem("studentDOB", dob);
        if(mobile) localStorage.setItem("studentMobile", mobile);
        if(email) localStorage.setItem("studentEmail", email);
        if(linkedin) localStorage.setItem("studentLinkedin", linkedin);
        if(github) localStorage.setItem("studentGithub", github);
        if(skillsboost) localStorage.setItem("studentSkillsboost", skillsboost);
        if(fatherMobile) localStorage.setItem("studentFatherMobile", fatherMobile);
        if(motherMobile) localStorage.setItem("studentMotherMobile", motherMobile);
        if(hobbies) localStorage.setItem("studentHobbies", hobbies);
        if(category) localStorage.setItem("studentCategory", category);
        if(achievements) localStorage.setItem("studentAchievements", achievements);
        
        alert("✅ Profile Saved Successfully! Redirecting to Dashboard...");
        
        // Redirect to dashboard after profile save
        window.location.href = "dashboard.html";
    }

}

// Upload profile image code
const profileInput = document.getElementById("profileInput");
const profilePreview = document.getElementById("profilePreview");

profileInput.addEventListener("change", function(){

    const file = this.files[0];

    if(file){

        const reader = new FileReader();

        reader.onload = function(e){

            profilePreview.src = e.target.result;
            // Save profile image to localStorage
            localStorage.setItem("studentProfileImage", e.target.result);

        };

        reader.readAsDataURL(file);

    }

});

// Load saved USN from login
const savedUSN = localStorage.getItem("studentUSN");

if(savedUSN){

    document.getElementById("usn").value = savedUSN;

}

// Load previously saved profile data if exists
function loadSavedProfileData() {
    const savedName = localStorage.getItem("studentName");
    if(savedName) {
        document.getElementById("name").value = savedName;
    }
    
    const savedDOB = localStorage.getItem("studentDOB");
    if(savedDOB) {
        document.getElementById("dob").value = savedDOB;
    }
    
    const savedMobile = localStorage.getItem("studentMobile");
    if(savedMobile) {
        document.getElementById("mobile").value = savedMobile;
    }
    
    const savedEmail = localStorage.getItem("studentEmail");
    if(savedEmail) {
        document.getElementById("email").value = savedEmail;
    }
    
    const savedLinkedin = localStorage.getItem("studentLinkedin");
    if(savedLinkedin) {
        document.getElementById("linkedin").value = savedLinkedin;
    }
    
    const savedGithub = localStorage.getItem("studentGithub");
    if(savedGithub) {
        document.getElementById("github").value = savedGithub;
    }
    
    const savedSkillsboost = localStorage.getItem("studentSkillsboost");
    if(savedSkillsboost) {
        document.getElementById("skillsboost").value = savedSkillsboost;
    }
    
    const savedFatherMobile = localStorage.getItem("studentFatherMobile");
    if(savedFatherMobile) {
        document.getElementById("fatherMobile").value = savedFatherMobile;
    }
    
    const savedMotherMobile = localStorage.getItem("studentMotherMobile");
    if(savedMotherMobile) {
        document.getElementById("motherMobile").value = savedMotherMobile;
    }
    
    const savedHobbies = localStorage.getItem("studentHobbies");
    if(savedHobbies) {
        document.getElementById("hobbies").value = savedHobbies;
    }
    
    const savedCategory = localStorage.getItem("studentCategory");
    if(savedCategory && savedCategory !== "Select Category") {
        document.getElementById("category").value = savedCategory;
    }
    
    const savedAchievements = localStorage.getItem("studentAchievements");
    if(savedAchievements) {
        document.getElementById("achievements").value = savedAchievements;
    }
    
    const savedProfileImage = localStorage.getItem("studentProfileImage");
    if(savedProfileImage) {
        profilePreview.src = savedProfileImage;
    }
}

// Call this function when page loads
loadSavedProfileData();

</script>

</body>
</html>
