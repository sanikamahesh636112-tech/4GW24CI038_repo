<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login - GENESIS PORTAL 3.0</title>
  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background: linear-gradient(to right,#1a1a2e,#16213e);
      color:white;
    }

    .container{
      width:90%;
      max-width:1200px;
      height:90vh;
      display:flex;
      border-radius:20px;
      overflow:hidden;
      box-shadow:0px 0px 40px rgba(220, 38, 38, 0.3);
    }

    .left{
      flex:1;
      background: linear-gradient(135deg,#1a1a2e,#16213e);
      padding:60px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .logo{
      font-size:20px;
      font-weight:bold;
      margin-bottom:50px;
      color:#fbbf24;
    }

    .title{
      font-size:60px;
      font-weight:bold;
      margin-bottom:40px;
    }

    .title span{
      color:#dc2626;
    }

    .feature{
      background:#273549;
      padding:18px;
      border-radius:12px;
      margin-bottom:20px;
      font-size:18px;
      border-left:4px solid #dc2626;
    }

    .right{
      width:420px;
      background:white;
      color:black;
      padding:40px;
      display:flex;
      flex-direction:column;
      justify-content:center;
    }

    .right h1{
      color:#dc2626;
      margin-bottom:10px;
      text-align:center;
      font-size:32px;
    }

    .right p{
      text-align:center;
      margin-bottom:30px;
      color:gray;
      font-size:14px;
    }

    .admin-badge{
      text-align:center;
      background:#fef2f2;
      color:#dc2626;
      padding:8px;
      border-radius:8px;
      margin-bottom:20px;
      font-weight:bold;
      font-size:12px;
      text-transform:uppercase;
    }

    label{
      font-weight:bold;
      margin-bottom:8px;
      display:block;
      color:#374151;
      font-size:14px;
    }

    input{
      width:100%;
      padding:14px;
      margin-bottom:20px;
      border:2px solid #e5e7eb;
      border-radius:10px;
      font-size:16px;
      transition:0.3s;
    }

    input:focus{
      outline:none;
      border-color:#dc2626;
      box-shadow:0 0 10px rgba(220, 38, 38, 0.2);
    }

    button{
      width:100%;
      padding:15px;
      border:none;
      border-radius:10px;
      background:linear-gradient(to right,#dc2626,#991b1b);
      color:white;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      transition:0.3s;
    }

    button:hover{
      transform:translateY(-2px);
      box-shadow:0 10px 20px rgba(220, 38, 38, 0.3);
    }

    button:disabled{
      opacity:0.6;
      cursor:not-allowed;
    }

    .bottom{
      margin-top:20px;
      text-align:center;
      color:gray;
      font-size:13px;
    }

    .bottom a{
      color:#dc2626;
      text-decoration:none;
      font-weight:bold;
    }

    .error-message{
      color: white;
      font-size: 14px;
      margin-top: -15px;
      margin-bottom: 15px;
      display: none;
      background:#fee2e2;
      padding:12px;
      border-radius:8px;
      border-left:4px solid #dc2626;
      color:#991b1b;
    }

    .success-message{
      color: white;
      font-size: 14px;
      margin-top: -15px;
      margin-bottom: 15px;
      display: none;
      background:#dcfce7;
      padding:12px;
      border-radius:8px;
      border-left:4px solid #22c55e;
      color:#166534;
    }

    .loading{
      display: none;
      text-align: center;
      margin-top: 10px;
      color:#dc2626;
    }

    .loading::after{
      content: "...";
      animation: dots 0.6s steps(3, end) infinite;
    }

    @keyframes dots {
      0%, 20% { content: "."; }
      40% { content: ".."; }
      60%, 100% { content: "..."; }
    }

    @media (max-width: 768px) {
      .container {
        flex-direction: column;
        width: 100%;
        height: 100vh;
      }
      .right {
        width: 100%;
      }
      .left {
        padding: 30px;
      }
      .title {
        font-size: 40px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="left">
      <div class="logo">
        🛡️ ADMIN PANEL<br>
        GSSSIETW
      </div>
      <div class="title">
        GENESIS <span>ADMIN</span>
      </div>
      <div class="feature">🔐 Secure Admin Access</div>
      <div class="feature">📊 Complete System Control</div>
      <div class="feature">👥 Manage Users & Content</div>
      <div class="feature">📈 Analytics & Reports</div>
    </div>

    <div class="right">
      <div class="admin-badge">🔒 Administrator Access</div>
      <h1>Admin Login</h1>
      <p>Restricted access for administrators only</p>

      <label>Admin ID / Email</label>
      <input type="text" id="adminId" placeholder="e.g., admin001 or admin@gsssietw.edu">

      <label>Master Password</label>
      <input type="password" id="adminPassword" placeholder="Enter admin password">

      <div id="errorMsg" class="error-message"></div>
      <div id="successMsg" class="success-message"></div>
      
      <button onclick="loginAdmin()" id="loginBtn">
        🔓 LOGIN TO ADMIN PANEL
      </button>

      <div class="loading" id="loading">
        Verifying credentials
      </div>

      <div class="bottom">
        <a href="index.html">← Back to Student Login</a> | 
        <a href="faculty-login.html">Faculty Login →</a>
      </div>
    </div>
  </div>

  <script>
    function loginAdmin(){
      const adminId = document.getElementById("adminId").value.trim();
      const adminPassword = document.getElementById("adminPassword").value;
      const errorMsg = document.getElementById("errorMsg");
      const successMsg = document.getElementById("successMsg");
      const loginBtn = document.getElementById("loginBtn");
      const loading = document.getElementById("loading");

      // Clear previous messages
      errorMsg.style.display = "none";
      successMsg.style.display = "none";
      errorMsg.textContent = "";
      successMsg.textContent = "";

      // Validate inputs
      if(adminId === "admin001" || adminPassword === "admin123"){
        errorMsg.style.display = "block";
        errorMsg.textContent = "❌ Please enter Admin ID and Password";
        return;
      }

      // Show loading
      loginBtn.disabled = true;
      loading.style.display = "block";

      // Simulate admin credentials check
      setTimeout(() => {
        // Demo credentials - CHANGE THESE IN PRODUCTION
        const validAdmins = {
          "admin001": "admin123",
          "admin002": "admin123",
          "admin@gsssietw.edu": "admin123"
        };

        if (validAdmins[adminId] && validAdmins[adminId] === adminPassword) {
          // Store admin session
          localStorage.setItem("adminId", adminId);
          localStorage.setItem("adminRole", "administrator");
          localStorage.setItem("adminLoginTime", new Date().toLocaleString());
          localStorage.setItem("adminLoginCount", (parseInt(localStorage.getItem("adminLoginCount")) || 0) + 1);

          successMsg.style.display = "block";
          successMsg.textContent = "✅ Login Successful! Redirecting to Admin Dashboard...";
          
          setTimeout(() => {
            window.location.href = "admin-dashboard.html";
          }, 1500);
        } else {
          loginBtn.disabled = false;
          loading.style.display = "none";
          errorMsg.style.display = "block";
          errorMsg.textContent = "❌ Invalid Admin ID or Password";
        }
      }, 1000);
    }

    // Allow Enter key to login
    document.addEventListener('keypress', function(event) {
      if (event.key === 'Enter') {
        loginAdmin();
      }
    });

    // Check if already logged in as admin
    const adminId = localStorage.getItem("adminId");
    if (adminId && (window.location.pathname === '/admin-login.html')) {
      window.location.href = "admin-dashboard.html";
    }
  </script>
</body>
</html>
